{% extends "base.html" %}
{% block content %}

<h3 class="section-title">&#9881; 인력 재배치 시뮬레이션</h3>

<!-- 시뮬레이션 입력 -->
<div class="card">
    <div class="card-header">
        <span class="card-title">시뮬레이션 조건 설정</span>
    </div>
    <div class="grid-3">
        <div>
            <label class="text-sm fw-bold">부서 선택</label>
            <select id="sim-dept" class="btn btn-outline" style="width:100%;margin-top:0.5rem;padding:0.6rem">
            </select>
        </div>
        <div>
            <label class="text-sm fw-bold">전환 인원 (명)</label>
            <input type="number" id="sim-headcount" value="10" min="1" max="50"
                style="width:100%;margin-top:0.5rem;padding:0.6rem;border:1.5px solid var(--border);border-radius:8px">
        </div>
        <div style="display:flex;align-items:flex-end">
            <button class="btn btn-primary" style="width:100%;padding:0.7rem" onclick="runSimulation()">
                &#9654; 시뮬레이션 실행
            </button>
        </div>
    </div>
</div>

<!-- 결과 영역 -->
<div id="sim-results" style="display:none">
    <!-- 비용 비교 -->
    <div class="card mt-2">
        <div class="card-header">
            <span class="card-title">&#128176; 비용 비교 분석: 재교육 vs 해고 후 신규 채용</span>
        </div>
        <div class="sim-compare" id="sim-compare"></div>
    </div>

    <!-- 상세 분석 -->
    <div class="grid-2 mt-2">
        <!-- 직무 격차 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">&#127919; 직무 격차 상세</span>
            </div>
            <div id="sim-gap-detail"></div>
        </div>

        <!-- 추천 교육 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">&#128218; 추천 교육 프로그램</span>
            </div>
            <div id="sim-trainings"></div>
        </div>
    </div>

    <!-- 비용 차트 -->
    <div class="card mt-2">
        <div class="card-header">
            <span class="card-title">비용 항목별 비교</span>
        </div>
        <div class="chart-wrapper">
            <canvas id="costChart"></canvas>
        </div>
    </div>
</div>

<!-- 전체 부서 요약 -->
<h3 class="section-title">&#128202; 전체 부서 전환 요약</h3>
<div class="card">
    <table class="data-table">
        <thead>
            <tr>
                <th>부서</th>
                <th>전환 목표</th>
                <th>격차 수준</th>
                <th>격차 점수</th>
                <th>필요 역량 수</th>
                <th>추천 교육</th>
            </tr>
        </thead>
        <tbody id="dept-summary-table"></tbody>
    </table>
</div>

{% endblock %}

{% block scripts %}
<script>
let costChartInstance = null;

document.addEventListener('DOMContentLoaded', async () => {
    const depts = await fetchAPI('/departments');
    const select = document.getElementById('sim-dept');
    for (const name of Object.keys(depts)) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = `${name} → ${depts[name].green_target}`;
        select.appendChild(opt);
    }

    // 부서 요약 테이블
    const gaps = await fetchAPI('/skill-pivot/gaps');
    document.getElementById('dept-summary-table').innerHTML = gaps.map(g => {
        const color = g.gap_score > 0.7 ? 'danger' : (g.gap_score > 0.4 ? 'warning' : 'success');
        return `
            <tr>
                <td class="fw-bold">${g.department}</td>
                <td>${g.target}</td>
                <td><span class="card-badge badge-${color}">${g.gap_level}</span></td>
                <td>${(g.gap_score * 100).toFixed(0)}%</td>
                <td>${g.skills_to_acquire_count}개</td>
                <td class="text-sm">${g.top_training || '-'}</td>
            </tr>`;
    }).join('');
});

async function runSimulation() {
    const dept = document.getElementById('sim-dept').value;
    const headcount = document.getElementById('sim-headcount').value;

    const [sim, gap] = await Promise.all([
        fetchAPI(`/skill-pivot/simulate?department=${encodeURIComponent(dept)}&headcount=${headcount}`),
        fetchAPI(`/skill-pivot/department/${encodeURIComponent(dept)}`),
    ]);

    document.getElementById('sim-results').style.display = 'block';

    // 비용 비교
    const rt = sim.retraining_path;
    const lf = sim.layoff_path;
    const isRetrainBetter = rt.total_cost < lf.total_cost;

    document.getElementById('sim-compare').innerHTML = `
        <div class="sim-option ${isRetrainBetter ? 'sim-recommended' : ''}" style="background:#d1fae5">
            <div class="text-sm fw-bold">&#127891; 재교육 경로</div>
            <div class="sim-cost text-success">${formatCurrency(rt.total_cost)}</div>
            <div class="text-sm">전환 기간: ${rt.transition_months}개월</div>
            <div class="text-sm">성공 확률: ${(rt.success_probability * 100).toFixed(0)}%</div>
        </div>
        <div class="sim-vs">VS</div>
        <div class="sim-option ${!isRetrainBetter ? 'sim-recommended' : ''}" style="background:#fee2e2">
            <div class="text-sm fw-bold">&#128683; 해고 후 신규 채용</div>
            <div class="sim-cost text-danger">${formatCurrency(lf.total_cost)}</div>
            <div class="text-sm">퇴직금 + 채용비 + 교육비</div>
            <div class="text-sm">사회적 비용 포함</div>
        </div>
    `;

    // 직무 격차 상세
    document.getElementById('sim-gap-detail').innerHTML = `
        <div class="text-sm mb-1">
            <strong>격차 점수:</strong>
            <span style="color:${gap.gap_score > 0.7 ? '#ef4444' : '#f59e0b'}">${(gap.gap_score * 100).toFixed(0)}% (${gap.gap_level})</span>
        </div>
        <div class="grid-2 mt-1" style="gap:0.5rem">
            <div>
                <div class="text-xs fw-bold text-secondary mb-1">전환 가능 역량</div>
                ${gap.transferable_skills.map(s => `<span class="card-badge badge-success" style="margin:2px">${s}</span>`).join('')}
            </div>
            <div>
                <div class="text-xs fw-bold text-secondary mb-1">신규 습득 필요</div>
                ${gap.skills_to_acquire.map(s => `<span class="card-badge badge-danger" style="margin:2px">${s}</span>`).join('')}
            </div>
        </div>
        <div class="mt-2">
            <div class="text-xs fw-bold text-secondary mb-1">불필요해지는 역량</div>
            ${gap.obsolete_skills.map(s => `<span class="card-badge" style="background:#f1f5f9;color:#94a3b8;margin:2px">${s}</span>`).join('')}
        </div>
    `;

    // 추천 교육
    document.getElementById('sim-trainings').innerHTML = gap.recommended_trainings.slice(0, 4).map(t => `
        <div class="alert-item alert-medium" style="margin-bottom:0.5rem">
            <div>
                <strong>${t.name}</strong>
                <span class="card-badge badge-primary">${t.provider}</span>
                <div class="text-sm text-secondary mt-1">
                    기간: ${t.duration_weeks}주 | 매칭 역량: ${t.matching_skills.join(', ')}
                </div>
                <div class="progress-bar mt-1">
                    <div class="progress-fill" style="width:${(t.relevance*100).toFixed(0)}%;background:#1a73e8"></div>
                </div>
                <div class="text-xs text-secondary">적합도 ${(t.relevance*100).toFixed(0)}%</div>
            </div>
        </div>
    `).join('');

    // 비용 차트
    if (costChartInstance) costChartInstance.destroy();
    costChartInstance = new Chart(document.getElementById('costChart'), {
        type: 'bar',
        data: {
            labels: ['교육비', '생산성 저하', '퇴직금', '채용 비용', '신규 교육', '사회적 비용'],
            datasets: [
                {
                    label: '재교육 경로',
                    data: [rt.education_cost, rt.productivity_loss, 0, 0, 0, 0],
                    backgroundColor: 'rgba(13, 148, 136, 0.7)',
                    borderRadius: 4,
                },
                {
                    label: '해고 경로',
                    data: [0, 0, lf.severance_cost, lf.recruitment_cost, lf.new_training_cost, lf.social_cost],
                    backgroundColor: 'rgba(239, 68, 68, 0.7)',
                    borderRadius: 4,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                tooltip: {
                    callbacks: {
                        label: ctx => `${ctx.dataset.label}: ${formatCurrency(ctx.raw)}`
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { callback: v => formatCurrency(v) }
                }
            }
        }
    });
}
</script>
{% endblock %}
