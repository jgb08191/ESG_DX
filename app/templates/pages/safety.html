{% extends "base.html" %}
{% block content %}

<h3 class="section-title">&#128680; Safety Alert - 친환경 공정 전환 안전 관리</h3>

<!-- 요약 카드 -->
<div class="grid-4" id="safety-summary">
    <div class="card score-card">
        <div class="score-icon">&#128737;</div>
        <div class="score-value text-danger" id="safety-total">--</div>
        <div class="score-label">전체 위험 요소</div>
    </div>
    <div class="card score-card">
        <div class="score-icon">&#9888;&#65039;</div>
        <div class="score-value text-critical" id="safety-critical">--</div>
        <div class="score-label">CRITICAL</div>
    </div>
    <div class="card score-card">
        <div class="score-icon">&#128293;</div>
        <div class="score-value text-warning" id="safety-high">--</div>
        <div class="score-label">HIGH</div>
    </div>
    <div class="card score-card">
        <div class="score-icon">&#128312;</div>
        <div class="score-value text-primary" id="safety-medium">--</div>
        <div class="score-label">MEDIUM</div>
    </div>
</div>

<!-- 법령 검색 -->
<div class="card mt-2">
    <div class="card-header">
        <span class="card-title">&#128269; 법령 및 안전 가이드 검색 (Safety RAG)</span>
    </div>
    <div class="flex gap-1">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요 (예: 배터리, 감전, 화재...)"
            style="flex:1; padding:0.5rem 1rem; border:1.5px solid var(--border); border-radius:8px; font-size:0.9rem;"
            onkeydown="if(event.key==='Enter')searchReg()">
        <button class="btn btn-primary" onclick="searchReg()">&#128269; 검색</button>
    </div>
    <div id="search-results" class="mt-2"></div>
</div>

<!-- 위험 요소 상세 -->
<div class="card mt-2">
    <div class="card-header">
        <span class="card-title">공정별 위험 요소 상세</span>
    </div>
    <div id="alerts-detail"></div>
</div>

<!-- 위험 분포 차트 -->
<div class="grid-2 mt-2">
    <div class="card">
        <div class="card-header">
            <span class="card-title">위험 등급 분포</span>
        </div>
        <div class="chart-wrapper">
            <canvas id="riskDistChart"></canvas>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">공정별 위험 수준</span>
        </div>
        <div class="chart-wrapper">
            <canvas id="processRiskChart"></canvas>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const [summary, alerts] = await Promise.all([
        fetchAPI('/safety/summary'),
        fetchAPI('/safety/alerts'),
    ]);

    // 요약
    document.getElementById('safety-total').textContent = summary.total_hazards;
    document.getElementById('safety-critical').textContent = summary.critical;
    document.getElementById('safety-high').textContent = summary.high;
    document.getElementById('safety-medium').textContent = summary.medium;

    // 상세 알림
    document.getElementById('alerts-detail').innerHTML = alerts.map(a => {
        const cls = { critical: 'alert-critical', high: 'alert-high', medium: 'alert-medium' }[a.risk_level];
        const icon = { critical: '&#9888;&#65039;', high: '&#128293;', medium: '&#128312;' }[a.risk_level];
        return `
            <div class="alert-item ${cls}" style="margin-bottom:0.75rem">
                <span class="alert-icon">${icon}</span>
                <div style="flex:1">
                    <div class="flex justify-between items-center">
                        <strong>${a.process_name} - ${a.hazard_type}</strong>
                        ${riskBadge(a.risk_level)}
                    </div>
                    <div class="text-sm mt-1"><strong>관련 법령:</strong> ${a.regulation}</div>
                    <div class="text-sm mt-1" style="background:#f8fafc;padding:0.5rem;border-radius:6px">
                        <strong>&#128214; 안전 가이드:</strong> ${a.guideline}
                    </div>
                </div>
            </div>`;
    }).join('');

    // 위험 등급 분포 차트
    new Chart(document.getElementById('riskDistChart'), {
        type: 'doughnut',
        data: {
            labels: ['CRITICAL', 'HIGH', 'MEDIUM'],
            datasets: [{
                data: [summary.critical, summary.high, summary.medium],
                backgroundColor: ['#dc2626', '#f59e0b', '#3b82f6'],
                borderWidth: 0,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '55%',
            plugins: { legend: { position: 'bottom' } }
        }
    });

    // 공정별 위험 수준 차트
    const riskScore = { critical: 3, high: 2, medium: 1 };
    new Chart(document.getElementById('processRiskChart'), {
        type: 'bar',
        data: {
            labels: alerts.map(a => a.process_name),
            datasets: [{
                label: '위험 수준',
                data: alerts.map(a => riskScore[a.risk_level]),
                backgroundColor: alerts.map(a => riskColor(a.risk_level)),
                borderRadius: 4,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            scales: {
                x: {
                    max: 3,
                    ticks: {
                        callback: v => ['', 'MEDIUM', 'HIGH', 'CRITICAL'][v]
                    }
                }
            },
            plugins: { legend: { display: false } }
        }
    });
});

async function searchReg() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    const results = await fetchAPI(`/safety/search?q=${encodeURIComponent(q)}`);
    const container = document.getElementById('search-results');

    if (results.length === 0) {
        container.innerHTML = '<div class="text-sm text-secondary">검색 결과가 없습니다.</div>';
        return;
    }

    container.innerHTML = results.map(r => `
        <div class="alert-item alert-medium" style="margin-bottom:0.5rem">
            <div>
                <strong>${r.process}</strong> ${riskBadge(r.risk_level)}
                <div class="text-sm mt-1"><strong>법령:</strong> ${r.regulation}</div>
                <div class="text-sm mt-1"><strong>가이드:</strong> ${r.guideline}</div>
            </div>
        </div>
    `).join('');
}
</script>
{% endblock %}
