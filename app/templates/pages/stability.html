{% extends "base.html" %}
{% block content %}

<h3 class="section-title">&#128200; Stability Tracker - 고용 안정성 추적</h3>

<!-- 상단 요약 -->
<div class="grid-4" id="stability-summary">
    <div class="card score-card">
        <div class="score-icon">&#128202;</div>
        <div class="score-value" id="stab-score">--</div>
        <div class="score-label">고용 안정 점수</div>
        <div class="score-sub" id="stab-grade"></div>
    </div>
    <div class="card score-card">
        <div class="score-icon">&#128101;</div>
        <div class="score-value text-primary" id="stab-total">--</div>
        <div class="score-label">전체 직원</div>
    </div>
    <div class="card score-card">
        <div class="score-icon">&#9888;&#65039;</div>
        <div class="score-value text-danger" id="stab-short">--</div>
        <div class="score-label">기간제 비율</div>
    </div>
    <div class="card score-card">
        <div class="score-icon">&#128197;</div>
        <div class="score-value text-success" id="stab-tenure">--</div>
        <div class="score-label">평균 근속(월)</div>
    </div>
</div>

<!-- 차트들 -->
<div class="grid-2 mt-2">
    <div class="card">
        <div class="card-header">
            <span class="card-title">근속 기간별 퇴사자 분포 (11개월 쪼개기 감지)</span>
        </div>
        <div class="chart-wrapper">
            <canvas id="turnoverDetailChart"></canvas>
        </div>
        <div class="text-sm text-secondary mt-1" id="turnover-analysis"></div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="card-title">계약 유형별 직원 비율</span>
        </div>
        <div class="chart-wrapper">
            <canvas id="contractChart"></canvas>
        </div>
    </div>
</div>

<!-- 위험 직원 목록 -->
<div class="card mt-2">
    <div class="card-header">
        <span class="card-title">&#128680; 고용 위기 사전 알림 - 계약 만료 임박 직원</span>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>이름</th>
                <th>부서</th>
                <th>근속(월)</th>
                <th>계약유형</th>
                <th>상태</th>
                <th>권고 조치</th>
            </tr>
        </thead>
        <tbody id="risk-table-body"></tbody>
    </table>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const [stability, turnover, employees] = await Promise.all([
        fetchAPI('/stability/score'),
        fetchAPI('/stability/turnover'),
        fetchAPI('/employees'),
    ]);

    // 요약 카드
    document.getElementById('stab-score').textContent = stability.score;
    document.getElementById('stab-score').style.color = gradeColor(stability.grade);
    document.getElementById('stab-grade').textContent = `등급: ${stability.grade}`;
    document.getElementById('stab-grade').style.color = gradeColor(stability.grade);
    document.getElementById('stab-total').textContent = stability.details.total_employees;
    document.getElementById('stab-short').textContent =
        (stability.details.short_term_contract_ratio * 100).toFixed(1) + '%';
    document.getElementById('stab-tenure').textContent = stability.details.avg_tenure_months;

    // 퇴사 분포 차트
    const td = turnover.monthly_data;
    new Chart(document.getElementById('turnoverDetailChart'), {
        type: 'bar',
        data: {
            labels: td.map(d => d.label),
            datasets: [{
                label: '퇴사자 수',
                data: td.map(d => d.turnover_count),
                backgroundColor: td.map(d =>
                    d.tenure_month >= 10 && d.tenure_month <= 12
                        ? 'rgba(239,68,68,0.8)' : 'rgba(147,197,253,0.8)'
                ),
                borderColor: td.map(d =>
                    d.tenure_month >= 10 && d.tenure_month <= 12
                        ? '#dc2626' : '#3b82f6'
                ),
                borderWidth: 1,
                borderRadius: 4,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                annotation: {}
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    document.getElementById('turnover-analysis').innerHTML = turnover.is_abnormal
        ? `<strong style="color:#dc2626">&#9888; 이상 감지:</strong> 11~12개월차 퇴사 집중 비율 ${(turnover.concentration_ratio * 100).toFixed(1)}% - ${turnover.alert}`
        : '정상 범위 내 퇴사 분포입니다.';

    // 계약 유형 차트
    const regular = employees.filter(e => e.contract_type === '정규직').length;
    const contract = employees.filter(e => e.contract_type === '기간제').length;

    new Chart(document.getElementById('contractChart'), {
        type: 'doughnut',
        data: {
            labels: ['정규직', '기간제'],
            datasets: [{
                data: [regular, contract],
                backgroundColor: ['#0d9488', '#ef4444'],
                borderWidth: 0,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // 위험 직원 목록
    const riskEmps = employees
        .filter(e => e.risk_level !== 'low')
        .sort((a, b) => {
            const order = { high: 0, medium: 1 };
            return (order[a.risk_level] ?? 2) - (order[b.risk_level] ?? 2);
        });

    document.getElementById('risk-table-body').innerHTML = riskEmps.map(e => {
        const action = e.contract_type === '기간제'
            ? '정규직 전환 검토 (지원금 960만원/인)'
            : '직무 전환 교육 배치 권고';
        const status = e.tenure_months >= 10 && e.tenure_months <= 12
            ? '<span class="card-badge badge-critical">계약만료 임박</span>'
            : '<span class="card-badge badge-warning">모니터링 필요</span>';
        return `
            <tr>
                <td>${e.id}</td>
                <td>${e.name}</td>
                <td>${e.department}</td>
                <td>${e.tenure_months}</td>
                <td>${e.contract_type === '기간제' ?
                    '<span class="card-badge badge-danger">기간제</span>' :
                    '<span class="card-badge badge-success">정규직</span>'}</td>
                <td>${status}</td>
                <td class="text-sm">${action}</td>
            </tr>`;
    }).join('');
});
</script>
{% endblock %}
