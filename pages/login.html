<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · ESGFit</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { background: white; }
    .tab-switch {
      display: flex; background: var(--bg-soft);
      border-radius: 12px; padding: 4px; margin-bottom: 28px;
    }
    .tab-switch button {
      flex: 1; padding: 10px; font-size: 14px; font-weight: 600;
      color: var(--text-muted); border-radius: 8px;
      transition: all 0.2s;
    }
    .tab-switch button.active {
      background: white; color: var(--primary);
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body data-page="login" data-scope="sub">
  <main class="login-page">
    <aside class="login-visual">
      <div class="login-visual-content">
        <a href="../index.html" class="logo" style="color:white;">
          <span class="logo-mark">E</span>
          <span>ESGFit</span>
        </a>
        <div style="margin-top:120px;">
          <h2>지속가능한<br>경영의 첫걸음</h2>
          <p>142개 지표로 기업의 ESG 현주소를 진단하고,
          데이터 기반 개선 방향을 제시합니다.</p>
        </div>
      </div>
      <div class="login-visual-tags">
        <span class="login-visual-tag">정보공시</span>
        <span class="login-visual-tag">환경</span>
        <span class="login-visual-tag">사회</span>
        <span class="login-visual-tag">지배구조</span>
      </div>
    </aside>

    <div class="login-form-wrap">
      <div class="login-form">
        <a href="../index.html" class="logo" style="display:none;">
          <span class="logo-mark">E</span>
          <span>ESGFit</span>
        </a>

        <div class="tab-switch">
          <button id="tabLogin" class="active" type="button">로그인</button>
          <button id="tabSignup" type="button">회원가입</button>
        </div>

        <h1 id="formTitle">다시 오신 것을 환영합니다</h1>
        <p class="subtitle" id="formSubtitle">계정에 로그인하고 진단을 이어가세요.</p>

        <form id="authForm">
          <div class="form-group" id="companyGroup" style="display:none;">
            <label for="company">회사명</label>
            <input type="text" id="company" placeholder="예: 제주관광공사" autocomplete="organization">
          </div>
          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>

          <div class="form-row" id="loginExtras">
            <label><input type="checkbox"> 로그인 상태 유지</label>
            <a href="#">비밀번호 찾기</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">로그인</button>
        </form>

        <div class="divider">간편 로그인</div>

        <div class="social-btns">
          <button class="social-btn kakao" onclick="socialLogin('kakao')">
            <span class="icon">💬</span>
            카카오로 계속하기
          </button>
          <button class="social-btn google" onclick="socialLogin('google')">
            <span class="icon" style="color:#4285F4;">G</span>
            Google로 계속하기
          </button>
        </div>

        <p class="login-footer" id="loginFooter">
          아직 계정이 없으신가요? <a href="#" id="toSignup">회원가입</a>
        </p>
      </div>
    </div>
  </main>

  <div id="chatbotRoot"></div>

  <script src="../js/chatbot.js"></script>
  <script>
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const title = document.getElementById('formTitle');
    const subtitle = document.getElementById('formSubtitle');
    const companyGroup = document.getElementById('companyGroup');
    const loginExtras = document.getElementById('loginExtras');
    const submitBtn = document.getElementById('submitBtn');
    const footer = document.getElementById('loginFooter');
    const form = document.getElementById('authForm');

    function setMode(mode) {
      if (mode === 'signup') {
        tabLogin.classList.remove('active');
        tabSignup.classList.add('active');
        title.textContent = 'ESGFit과 함께 시작하세요';
        subtitle.textContent = '1분이면 회원가입이 완료됩니다.';
        companyGroup.style.display = '';
        loginExtras.style.display = 'none';
        submitBtn.textContent = '회원가입';
        footer.innerHTML = '이미 계정이 있으신가요? <a href="#" id="toLogin">로그인</a>';
        document.getElementById('toLogin')?.addEventListener('click', (e)=>{e.preventDefault(); setMode('login');});
      } else {
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        title.textContent = '다시 오신 것을 환영합니다';
        subtitle.textContent = '계정에 로그인하고 진단을 이어가세요.';
        companyGroup.style.display = 'none';
        loginExtras.style.display = '';
        submitBtn.textContent = '로그인';
        footer.innerHTML = '아직 계정이 없으신가요? <a href="#" id="toSignup">회원가입</a>';
        document.getElementById('toSignup')?.addEventListener('click', (e)=>{e.preventDefault(); setMode('signup');});
      }
    }

    tabLogin.addEventListener('click', () => setMode('login'));
    tabSignup.addEventListener('click', () => setMode('signup'));

    // URL param
    const params = new URLSearchParams(location.search);
    if (params.get('tab') === 'signup') setMode('signup');
    else setMode('login');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const company = document.getElementById('company').value || '';
      localStorage.setItem('esgfit_user', JSON.stringify({
        email, name: company || email.split('@')[0]
      }));
      alert('환영합니다! 홈으로 이동합니다.');
      location.href = '../index.html';
    });

    function socialLogin(provider) {
      const name = provider === 'kakao' ? '카카오 사용자' : 'Google 사용자';
      localStorage.setItem('esgfit_user', JSON.stringify({
        email: `user@${provider}.com`, name, provider
      }));
      alert(`${provider === 'kakao' ? '카카오' : 'Google'}로 로그인 완료`);
      location.href = '../index.html';
    }
  </script>
</body>
</html>
